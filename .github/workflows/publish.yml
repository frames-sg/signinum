name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run-only:
        description: "Run cargo publish in dry-run mode"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CRATES_IO_API_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
  DRY_RUN_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run-only }}

jobs:
  publish-ashlar-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-core

  publish-ashlar-j2k-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-j2k-native

  publish-ashlar-j2k-compare:
    needs:
      - publish-ashlar-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-j2k-compare

  publish-ashlar-tilecodec:
    needs:
      - publish-ashlar-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-tilecodec

  publish-ashlar-jpeg:
    needs:
      - publish-ashlar-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-jpeg

  publish-ashlar-jpeg-metal:
    needs:
      - publish-ashlar-core
      - publish-ashlar-jpeg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-jpeg-metal

  publish-ashlar-jpeg-cuda:
    needs:
      - publish-ashlar-core
      - publish-ashlar-jpeg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-jpeg-cuda

  publish-ashlar-j2k:
    needs:
      - publish-ashlar-core
      - publish-ashlar-j2k-native
      - publish-ashlar-j2k-compare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-j2k

  publish-ashlar-j2k-metal:
    needs:
      - publish-ashlar-core
      - publish-ashlar-j2k-native
      - publish-ashlar-j2k
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-j2k-metal

  publish-ashlar-j2k-cuda:
    needs:
      - publish-ashlar-core
      - publish-ashlar-j2k-native
      - publish-ashlar-j2k
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-j2k-cuda

  publish-ashlar-cli:
    needs:
      - publish-ashlar-jpeg
      - publish-ashlar-j2k
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh ashlar-cli
