name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run-only:
        description: "Run cargo publish in dry-run mode"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CRATES_IO_API_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
  CRATES_IO_INDEX_SETTLE_SECONDS: "130"
  DRY_RUN_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run-only }}

jobs:
  publish-signinum-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-core

  publish-signinum-j2k-native:
    needs:
      - publish-signinum-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-j2k-native

  publish-signinum-cuda-runtime:
    needs:
      - publish-signinum-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-cuda-runtime

  publish-signinum-jpeg:
    needs:
      - publish-signinum-j2k-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-jpeg

  publish-signinum-tilecodec:
    needs:
      - publish-signinum-j2k-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-tilecodec

  publish-signinum-j2k:
    needs:
      - publish-signinum-jpeg
      - publish-signinum-tilecodec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-j2k

  publish-signinum-jpeg-metal:
    needs:
      - publish-signinum-jpeg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-jpeg-metal

  publish-signinum-j2k-metal:
    needs:
      - publish-signinum-j2k
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-j2k-metal

  publish-signinum-jpeg-cuda:
    needs:
      - publish-signinum-jpeg
      - publish-signinum-cuda-runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-jpeg-cuda

  publish-signinum-j2k-cuda:
    needs:
      - publish-signinum-j2k
      - publish-signinum-cuda-runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-j2k-cuda

  publish-signinum-cli:
    needs:
      - publish-signinum-j2k
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: scripts/publish-crate.sh signinum-cli
