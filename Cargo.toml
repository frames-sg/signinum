[workspace]
resolver = "2"
members = [
    "crates/slidecodec-core",
    "crates/slidecodec-j2k",
    "crates/slidecodec-jpeg",
    "crates/slidecodec-tilecodec",
    "crates/slidecodec-cli",
]

[workspace.package]
version      = "1.0.0"
edition      = "2021"
rust-version = "1.94"
license      = "Apache-2.0"
repository   = "https://github.com/YOUR_USER/slidecodec"
homepage     = "https://github.com/YOUR_USER/slidecodec"
keywords     = ["pathology", "wsi", "jpeg", "jpeg2000", "tiff"]
categories   = ["multimedia::images"]

[workspace.dependencies]
thiserror = { version = "2", default-features = false }
proptest  = { version = "1" }
criterion = { version = "0.5", default-features = false }
flate2 = { version = "1.1", default-features = false, features = ["zlib"] }
zstd = { version = "0.13" }
weezl = { version = "0.1" }

[profile.release]
lto           = "fat"
codegen-units = 1
strip         = "symbols"
opt-level     = 3

[profile.release-bench]
inherits  = "release"
debug     = true
strip     = "none"
