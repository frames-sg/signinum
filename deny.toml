[advisories]
yanked     = "deny"
ignore     = [
    # Transitive via metal 0.33.0, the current Metal binding release.
    # RUSTSEC-2024-0436 is an unmaintained advisory for paste, not a known
    # memory-safety or code-execution vulnerability. Revisit when metal-rs
    # removes paste or offers a maintained replacement path.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards         = "deny"
allow-wildcard-paths = true
deny              = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
